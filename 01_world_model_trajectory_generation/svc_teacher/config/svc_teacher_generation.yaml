model:
  backend: "svc"

svc:
  pretrained_model_name_or_path: "/path/to/stable_virtual_camera_weights"
  weight_name: "model.safetensors"
  H: 576
  W: 576
  cfg: 4.0
  camera_scale: 2.0
  dynamic_camera_scale: true
  min_camera_scale: 0.5
  num_steps: 50
  cfg_min: 1.2
  chunk_strategy: "interp"
  guider_types: [1, 2]
  compile_model: false

worldfm:
  config_path: ""
  hw_path: ""
  moge_path: ""
  moge_pretrained: ""
  model_path: ""
  vae_path: ""
  render_size: 512
  image_size: 512
  step: 2
  cfg_scale: 4.5
  gpu_index: 0

action:
  distance:
    min: 0.1
    max: 6
    unit: 0.1
    max_step_per_frame: 0.2
  angle:
    min: 10.0
    max: 100.0
    unit: 10.0
    max_step_per_frame: 5.0

trajectory:
  min_num_frames: 8
  single_step:
    - "forward"
    - "backward"
    - "turn_left"
    - "turn_right"
    - "shift_left"
    - "shift_right"
  multi_step_presets:
    - name: "forward_then_turn_left"
      steps:
        - act: "forward"
          distance_range: [0.5, 3.5]
        - act: "turn_left"
          angle_range: [20.0, 80.0]
    - name: "turn_right_then_forward"
      steps:
        - act: "turn_right"
          angle_range: [20.0, 80.0]
        - act: "forward"
          distance_range: [0.3, 3.0]
    - name: "shift_left_then_forward_then_turn_right"
      steps:
        - act: "shift_left"
          distance_range: [0.3, 3.0]
        - act: "forward"
          distance_range: [0.5, 3.5]
        - act: "turn_right"
          angle_range: [20.0, 60.0]

quality:
  blur_detection:
    enabled: false
    max_retries: 0
    frame_increase_factor: 2.0
    laplacian_threshold: 100.0
    brisque_threshold: 50.0
    brisque_model_path: ""
    brisque_range_path: ""
  input_filter:
    enabled: false
  temporal_qc:
    enabled: false
    min_diff: 0.01
    max_diff: 0.4

sampling:
  frame_keep_k: 2

output:
  root: "outputs"
  save_mp4: false
  fps: 30

prompt:
  templates_path: "datagen/prompt/templates.jsonl"
  undetect_out: "data_undetect.jsonl"
  detect_out: "data_detect.jsonl"

general:
  seed: -1
  device: "cuda:0"
  skip_existing: true
  camera_config: "simulate_camera.yaml"
  version: "svc_scene_demo"
  input_dir: ""
  manifest_jsonl: ""
  num_chunks: 0
  chunk_idx: 0
  merge_chunks: false
